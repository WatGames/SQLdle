<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy</title>
    <link rel="stylesheet" href="style.css">
    <!-- The following scripts are used to generate prompts, check answers and keep track of used prompts for the easy difficulty level. -->
    <script src="databases.js" defer></script>
    <script src="usedprompts.js" defer></script>
    <script src="easy.js" defer></script>    
</head>
<body>
    <button onclick="window.location.href='index.html'">Back</button>
    <h1>SQLdle - Easy</h1>
    
    <div id = "prompt-box">
        <p id="database">Loading database...</p>
        <p id="prompt-text">Loading prompt...</p>
    </div>
    <div id="count">Attempts left: 5</div>
    <textarea id="query-input" rows="4" cols="50" placeholder="Enter your SQL query here..."></textarea>
    <br>
    <button onclick="checkAnswer()">Submit</button>

    <button onclick="newPrompt()">New Prompt</button>
    <p id="feedback"></p>
</body>
</html>
